title: "Highlight Image with text on either the right or the left hand side"
extends@: default

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          fields:
            content_description:
              type: display
              size: large
              label: false
              markdown: true
              content: "The first image given in the media section will be used for the image. Make sure its square. Use `<!-- slide -->` to separate the content into slides."
            header.text_left:
              type: toggle
              label: Text on the left hand side
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool
